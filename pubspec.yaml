name: transborder_logistics
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+6

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  intl: ^0.20.1
  get: ^4.6.5
  dio: ^5.1.2
  iconsax_plus: ^1.0.0
  flutter_svg: ^2.0.2
  connectivity_plus: ^7.0.0
  get_storage_wasm: ^2.1.3
  cached_network_image: ^3.2.3
  shimmer: ^3.0.0
  url_launcher: ^6.1.11
  share_plus: ^12.0.0
  flutter_native_splash: ^2.2.19
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  photo_view: ^0.15.0
  hugeicons: ^1.1.1
  image_picker: ^1.2.1
  flutter_local_notifications: ^19.5.0
  mobile_scanner: ^7.1.3
  path: ^1.9.1
  path_provider: ^2.1.5
  excel: ^4.0.6
  qr_flutter: ^4.1.0
  file_picker: ^10.3.6
  syncfusion_flutter_signaturepad: ^31.2.12
  widgets_to_image: ^2.0.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  fl_chart: ^0.69.0
  geolocator: ^13.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Bold.ttf
          weight: 700
        - asset: assets/fonts/Geist-Medium.ttf
          weight: 500
        - asset: assets/fonts/Geist-Regular.ttf
          weight: 400

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logo.png
  web: true
  android_12:
      image: assets/images/flogo.png
      icon_background_color: "#ffffff"
      image_dark: assets/images/flogo.png
      icon_background_color_dark: "#ffffff"

flutter_launcher_icons:
  web:
    generate: true
    image_path: "assets/images/flogo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "assets/images/flogo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/images/flogo.png"
